<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OceanView Resort — Staff Login</title>
  <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="brand">
      <h1>OceanView Resort</h1>
      <p>Staff Management Portal</p>
    </div>

    <!-- Show error banner when ?error=invalid is in the URL -->
    <div id="error-banner" class="error-banner hidden">
      Invalid username or password. Please try again.
    </div>

    <form action="login" method="post" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Enter username" required autofocus/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>
  </div>

  <script>
    // Show error banner if redirected with ?error=invalid
    if (new URLSearchParams(window.location.search).get('error') === 'invalid') {
      document.getElementById('error-banner').classList.remove('hidden');
    }
  </script>
</body>
</html>
